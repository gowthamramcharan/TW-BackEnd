<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Count:<span id="d1"></span></h1>
    <button onclick="inc()">Inc</button>
    <button onclick="dec()">Dec</button>
    <script>
           fetch("http://localhost:3300/count")
           .then(res=>res.json())
           .then((data)=>{document.getElementById("d1").innerText=data})
        function inc(){
            fetch("http://localhost:3300/incCount")
           .then(res=>res.json())
           .then((data)=>{document.getElementById("d1").innerText=data})
        }
        function dec(){
            fetch("http://localhost:3300/decCount")
           .then(res=>res.json())
           .then((data)=>{document.getElementById("d1").innerText=data})
        }
    </script>
</body>
</html>
