<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Addition</h1>
    <form onsubmit="senddata(event)">
        <input type="text" name="x" id="t1"> <br>
        <input type="text" name="y" id="t2"> <br>
        <button type="submit">Add</button>
    </form>
    <h1 id="d1"></h1>
    <script>
        function senddata(ev){
        ev.preventDefault()
        let a=document.getElementById("t1").value;
        let b=document.getElementById("t2").value;
        fetch("http://localhost:3300/addition",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({a,b})
         })
        .then(res=>res.text())
        .then((data)=>{document.getElementById("d1").innerText=data})
        }
    </script>
</body>
</html>
